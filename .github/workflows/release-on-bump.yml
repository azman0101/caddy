name: Release New Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    # Check if the commit message indicates a Caddy bump.
    # Dependabot titles are usually "Bump caddy from X to Y" or "Build(deps): Bump caddy..."
    # We check for "ump caddy" to cover "Bump caddy" and "bump caddy"
    if: contains(github.event.head_commit.message, 'ump caddy')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from Dockerfile
        id: get_version
        run: |
          # Extracts the version (e.g., 2.10.2) from "FROM caddy:2.10.2-builder" or "FROM caddy:2.10.2"
          VERSION=$(grep -oP '(?<=caddy:)[0-9.]+' Dockerfile | head -n 1)
          echo "Detected version: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG="v$VERSION"

          echo "Creating release for tag: $TAG"

          # Create a GitHub Release. This will trigger the existing build-publish.yml workflow.
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
